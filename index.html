<style>
:root {
  --yellow: #FFEF46;
  --yellow-dim: rgba(255,239,70,0.12);
  --yellow-border: rgba(255,239,70,0.3);
  --bg: #02050A;
  --bg1: #0d1117;
  --bg2: #141a22;
  --bg3: #1c2535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8a94a6;
  --text3: #4a5568;
  --red: #ef5350;
  --red-bg: rgba(239,83,80,0.12);
  --red-border: rgba(239,83,80,0.25);
  --orange: #FF9340;
  --orange-bg: rgba(255,147,64,0.1);
  --orange-border: rgba(255,147,64,0.25);
  --green: #4caf50;
  --green-bg: rgba(76,175,80,0.1);
  --blue: #7F9FF6;
  --blue-bg: rgba(127,159,246,0.1);
  --violet: #7F9FF6;
  --font-sans: 'FK Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'FK Grotesk Mono', 'SF Mono', 'Fira Code', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; font-size: 13px; }

/* HEADER */
header { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.header-text { display: flex; flex-direction: column; gap: 3px; }
header h1 { font-size: 18px; font-weight: 700; color: var(--yellow); white-space: nowrap; letter-spacing: -0.3px; font-family: var(--font-sans); }
header p { font-size: 12px; color: var(--text2); font-family: var(--font-sans); }
.header-logo { height: auto; flex-shrink: 0; }
.plat-tags { display: flex; gap: 5px; align-items: center; }
.plat-tag { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; letter-spacing: 0.05em; }

/* STATS */
.stats { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; text-align: center; cursor: pointer; transition: border-color .15s; min-width: 80px; }
.stat:hover { border-color: var(--border2); }
.stat.active { border-color: var(--yellow); background: var(--yellow-dim); }
.stat .n { font-size: 20px; font-weight: 700; line-height: 1.2; }
.stat .l { font-size: 10px; color: var(--text3); margin-top: 2px; }
.stat.c-yellow .n { color: var(--yellow); }
.stat.c-green .n { color: var(--green); }
.stat.c-red .n { color: var(--red); }
.stat.c-orange .n { color: var(--orange); }
.stat.c-blue .n { color: var(--blue); }

/* CONTROLS */
.controls { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 10; }
input[type=search] { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-family: var(--font-sans); padding: 7px 12px; width: 220px; outline: none; }
input[type=search]:focus { border-color: var(--yellow); }
select { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-family: var(--font-sans); padding: 7px 10px; outline: none; cursor: pointer; }
.fbtn { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; font-size: 11px; font-family: var(--font-sans); padding: 4px 12px; transition: all .15s; white-space: nowrap; }
.fbtn:hover { border-color: var(--border2); color: var(--text); }
.fbtn.active { background: var(--yellow); border-color: var(--yellow); color: #000; font-weight: 600; }

/* TABS */
.tabs { display: flex; background: var(--bg1); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); cursor: pointer; font-size: 12px; font-family: var(--font-sans); padding: 11px 16px; transition: all .15s; white-space: nowrap; }
.tab:hover { color: var(--text2); }
.tab.active { border-bottom-color: var(--yellow); color: var(--yellow); font-weight: 600; }
.tabs { display: flex; background: var(--bg1); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); cursor: pointer; font-size: 12px; padding: 11px 16px; transition: all .15s; white-space: nowrap; }
.tab:hover { color: var(--text2); }
.tab.active { border-bottom-color: var(--yellow); color: var(--yellow); font-weight: 600; }

main { padding: 20px 24px; }
.count-info { color: var(--text3); font-size: 11px; margin-bottom: 14px; }

/* TABLE */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg2); }
th { color: var(--text3); font-weight: 500; padding: 10px 14px; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; font-family: var(--font-sans); }
th.plat { color: var(--yellow); font-family: var(--font-mono); letter-spacing: 0.1em; }
tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .1s; }
tbody tr:hover { background: var(--bg2); }
tbody tr:last-child { border-bottom: none; }
tbody tr.conflict { background: var(--red-bg); }
tbody tr.conflict:hover { background: rgba(239,83,80,0.18); }
tbody tr.dup { background: var(--orange-bg); }
tbody tr.dup:hover { background: rgba(255,147,64,0.15); }
td { padding: 9px 14px; vertical-align: middle; }
td.lbl { font-weight: 500; color: var(--text); white-space: nowrap; }
td.seccell { font-size: 11px; color: var(--text3); }

.sec-tag { background: var(--bg3); border-radius: 3px; color: var(--text2); display: inline-block; font-size: 10px; margin: 1px 2px 1px 0; padding: 1px 5px; white-space: nowrap; }

.icell { display: flex; align-items: center; gap: 7px; min-width: 0; }
.iprev { width: 18px; height: 18px; filter: invert(1) opacity(0.65); flex-shrink: 0; }
.iname { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--text2); background: var(--bg3); padding: 2px 6px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; display: inline-block; }
.iname.ci { background: var(--red-bg); color: #f87171; }
.iname.di { background: var(--orange-bg); color: var(--orange); }

.badge { border-radius: 4px; display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; white-space: nowrap; }
.badge.ok { background: var(--green-bg); color: var(--green); }
.badge.conflict { background: var(--red-bg); color: var(--red); }
.badge.dup { background: var(--orange-bg); color: var(--orange); }
.badge.none { color: var(--text3); }
.dash { color: var(--text3); }

/* GALLERY */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.card { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: all .15s; }
.card:hover { border-color: var(--border2); transform: translateY(-1px); }
.card.conflict { border-color: var(--red-border); }
.card.dup { border-color: var(--orange-border); }
.card-img { align-items: center; background: var(--bg2); display: flex; height: 64px; justify-content: center; }
.card-img img { filter: invert(1) opacity(0.7); height: 28px; width: 28px; }
.card-body { padding: 8px 9px; }
.card-lbl { color: var(--text); font-size: 10px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
.card-sec { color: var(--text3); font-size: 9px; }
.card-status { font-size: 10px; margin-top: 4px; }

/* ICON INDEX */
.ii-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.ii-card { background: var(--bg1); border-radius: 10px; overflow: hidden; }
.ii-card.clean { border: 1px solid var(--border); }
.ii-card.problem { border: 1px solid var(--orange-border); }
.ii-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
.ii-img { background: var(--bg2); border-radius: 7px; padding: 9px; flex-shrink: 0; }
.ii-img img { display: block; filter: invert(1) opacity(0.8); height: 28px; width: 28px; }
.ii-name { font-family: 'SF Mono','Fira Code',monospace; font-size: 13px; font-weight: 700; color: var(--yellow); word-break: break-all; }
.ii-count { color: var(--text3); font-size: 11px; margin-top: 2px; }
.ii-badge-ok { background: var(--green-bg); border-radius: 4px; color: var(--green); font-size: 10px; font-weight: 700; padding: 2px 7px; margin-left: auto; flex-shrink: 0; }
.ii-badge-dup { background: var(--orange-bg); border-radius: 4px; color: var(--orange); font-size: 10px; font-weight: 700; padding: 2px 7px; margin-left: auto; flex-shrink: 0; }
.ii-actions-wrap { border-top: 1px solid var(--border); }
.ii-action-row { border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: flex-start; gap: 10px; padding: 7px 14px; }
.ii-action-row:last-child { border-bottom: none; }
.ii-action-lbl { color: var(--text); font-size: 11px; font-weight: 500; flex: 1; min-width: 0; }
.ii-action-sec { color: var(--text3); font-size: 10px; flex-shrink: 0; text-align: right; max-width: 110px; }

.ii-sug { background: rgba(127,159,246,0.07); border: 1px solid rgba(127,159,246,0.2); border-radius: 7px; margin: 0 14px 12px; padding: 10px 12px; }
.ii-sug-title { color: var(--blue); font-size: 10px; font-weight: 700; letter-spacing: .06em; margin-bottom: 8px; text-transform: uppercase; }
.ii-sug-rows { display: flex; flex-direction: column; gap: 6px; }
.ii-sug-row { display: flex; align-items: center; gap: 8px; font-size: 11px; flex-wrap: wrap; }
.ii-sug-action { color: var(--text2); flex: 1; min-width: 120px; }
.ii-sug-keep { color: var(--text3); font-family: monospace; font-size: 10px; }
.ii-sug-arrow { color: var(--text3); }
.ii-sug-new { align-items: center; background: var(--bg3); border: 1px solid rgba(165,214,167,0.25); border-radius: 5px; display: inline-flex; gap: 5px; padding: 3px 8px; }
.ii-sug-new img { filter: invert(1) opacity(0.7); height: 13px; width: 13px; }
.ii-sug-new span { color: #a5d6a7; font-family: monospace; font-size: 10px; }
.ii-sug-note { color: var(--text2); font-size: 10px; font-style: italic; margin-top: 4px; }

.ii-topstats { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.ii-topstat { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; text-align: center; }
.ii-topstat .n { font-size: 22px; font-weight: 700; }
.ii-topstat .l { font-size: 10px; color: var(--text3); margin-top: 2px; }

.dup-panel { display: flex; flex-direction: column; gap: 10px; }
.dup-card { background: var(--bg1); border: 1px solid var(--orange-border); border-radius: 10px; overflow: hidden; }

.empty { color: var(--text3); padding: 60px; text-align: center; }
</style>

const SUGS = {
  // bar_chart duplicates
  'Stocks placeholder':        { icon: 'candlestick_chart', note: 'More specific to financial data visualization' },
  'Volume':                    { icon: 'equalizer', note: 'Suggests quantity/magnitude, not market chart' },
  // swap_horiz duplicates
  'Liquidity':                 { icon: 'water_drop', note: 'Liquid assets metaphor, distinct from swap' },
  // language duplicates
  'Homepage':                  { icon: 'captive_portal', note: 'Avoid "home" — used in browser nav for going back to home. captive_portal suggests a web entry point' },
  // arrow_downward duplicates
  'Save':                      { icon: 'download', note: 'Semantically clearer for saving/downloading an NFT' },
  // attach_money duplicates
  'Currency':                  { icon: 'currency_exchange', note: 'More specific to currency settings vs. card payments' },
  // shield duplicates
  'Privacy policy':            { icon: 'policy', note: 'Document-like, distinct from security settings' },
  // paid duplicates — treat nav Earn as keeper
  'Earn Instructions':         { icon: 'info', note: 'Instructions are informational, not a payment action' },
  // grid_view duplicates
  'Grid view':                 { icon: 'grid_on', note: 'Collections nav uses grid_view — grid_on for the toggle is distinct' },
  // brush duplicates — keep for Customize, change Edit background
  'Customize / Edit background': { icon: 'brush', keep: true, keepNote: 'Primary customize action keeps brush' },
  // star — both keep star, different fill
  'Add to watchlist':          { icon: 'star', keep: true, keepNote: 'Filled star' },
  'Remove from watchlist':     { icon: 'star', keep: true, keepNote: 'Outlined star (star_border) — same icon name, different fill variant', note: 'Use outlined/border variant of the same star icon' },
  // trending_up duplicates
  'Limit order':               { icon: 'price_change', note: 'Suggests price threshold/target more clearly' },
  // lock / key
  'Request password':          { icon: 'password', note: 'More specific than key for password entry' },
};

// ── ICON MAP ──────────────────────────────────────────────────────────────────
const iconMap = {};
DATA.forEach(r => {
  [...new Set([r.mob, r.ext, r.web].filter(Boolean))].forEach(ic => {
    if (!iconMap[ic]) iconMap[ic] = [];
    if (!iconMap[ic].find(x => x.label === r.l))
      iconMap[ic].push({ label: r.l, sections: r.s });
  });
});

// ── STATUS ────────────────────────────────────────────────────────────────────
function getStatus(r) {
  const pairs = [['mob','ext'],['mob','web'],['ext','web']];
  for (const [a,b] of pairs)
    if (r[a] && r[b] && r[a] !== r[b]) return 'conflict';
  const vals = ['mob','ext','web'].map(p => r[p]).filter(Boolean);
  return vals.length <= 1 ? 'none' : 'ok';
}
function isDup(r) {
  return ['mob','ext','web'].some(p => r[p] && iconMap[r[p]] && iconMap[r[p]].length > 1);
}
function iconFor(r) { return r.mob || r.ext || r.web; }

const enriched = DATA.map(r => ({...r, status: getStatus(r), dup: isDup(r)}));
const allSections = [...new Set(DATA.flatMap(d => d.s))].sort();

// ── INIT ──────────────────────────────────────────────────────────────────────
const secSel = document.getElementById('secFilter');
allSections.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; secSel.appendChild(o); });

let filter = 'all', tab = 'table';

const statDefs = [
  {id:'all',   label:'Total',         cls:'c-yellow', f:'all'},
  {id:'ok',    label:'Consistent',    cls:'c-green',  f:'ok'},
  {id:'conf',  label:'Conflicts',     cls:'c-red',    f:'conflicts'},
  {id:'dup',   label:'Duplicates',    cls:'c-orange', f:'dup'},
  {id:'icons', label:'Unique icons',  cls:'c-blue',   f:null, t:'iconindex'},
];
const statsBar = document.getElementById('statsBar');
statDefs.forEach(s => {
  const el = Object.assign(document.createElement('div'), {className:`stat ${s.cls}`, id:`stat-${s.id}`});
  el.innerHTML = `<div class="n" id="n-${s.id}">—</div><div class="l">${s.label}</div>`;
  el.onclick = () => s.t ? setTab(s.t) : setFilter(s.f);
  statsBar.appendChild(el);
});

const filterDefs = [{l:'All',f:'all'},{l:'⚡ Conflicts',f:'conflicts'},{l:'✅ Consistent',f:'ok'},{l:'⚠️ Duplicates',f:'dup'}];
const filterBtns = document.getElementById('filterBtns');
filterDefs.forEach((fd,i) => {
  const b = Object.assign(document.createElement('button'), {className:'fbtn'+(i===0?' active':''), textContent:fd.l});
  b.onclick = () => setFilter(fd.f);
  filterBtns.appendChild(b);
});

const tabDefs = [
  {id:'table',     l:'📋 Table'},
  {id:'gallery',   l:'🖼 Gallery'},
  {id:'iconindex', l:'🔢 Icon Index'},
  {id:'duplicates',l:'⚠️ Same icon, diff action'},
];
const tabBar = document.getElementById('tabBar');
tabDefs.forEach(td => {
  const b = Object.assign(document.createElement('button'), {className:'tab'+(td.id==='table'?' active':''), textContent:td.l});
  b.onclick = () => setTab(td.id);
  tabBar.appendChild(b);
});

function setFilter(f) {
  filter = f;
  filterDefs.forEach((fd,i) => filterBtns.children[i].classList.toggle('active', fd.f===f));
  statDefs.forEach(s => document.getElementById(`stat-${s.id}`)?.classList.remove('active'));
  const m = {all:'stat-all',ok:'stat-ok',conflicts:'stat-conf',dup:'stat-dup'};
  if (m[f]) document.getElementById(m[f])?.classList.add('active');
  render();
}
function setTab(t) {
  tab = t;
  tabDefs.forEach((td,i) => tabBar.children[i].classList.toggle('active', td.id===t));
  document.getElementById('controls').style.display = t==='iconindex' ? 'none' : 'flex';
  if (t==='iconindex') document.getElementById('stat-icons').classList.add('active');
  else document.getElementById('stat-icons').classList.remove('active');
  render();
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  const sec = document.getElementById('secFilter').value;
  return enriched.filter(r => {
    if (sec && !r.s.includes(sec)) return false;
    if (q && !r.l.toLowerCase().includes(q) && !['mob','ext','web'].some(p => r[p]?.includes(q))) return false;
    if (filter==='ok') return r.status==='ok';
    if (filter==='conflicts') return r.status==='conflict';
    if (filter==='dup') return r.dup;
    return true;
  });
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
function icell(name, st, dp) {
  if (!name) return '<span class="dash">—</span>';
  const cls = st==='conflict'?'ci':(dp?'di':'');
  return `<div class="icell"><img class="iprev" src="${PNG(name)}" onerror="this.style.display='none'" loading="lazy"><span class="iname ${cls}" title="${name}">${name}</span></div>`;
}
function badge(r) {
  if (r.status==='conflict') return '<span class="badge conflict">⚡ Conflict</span>';
  if (r.status==='ok') return '<span class="badge ok">✅ OK</span>';
  if (r.dup) return '<span class="badge dup">⚠️ Duplicate</span>';
  return '<span class="badge none">—</span>';
}
function secTags(arr) { return arr.map(s=>`<span class="sec-tag">${s}</span>`).join(''); }

function sugBox(uses) {
  // build suggestion rows for this group of uses
  const rows = uses.map(u => {
    const s = SUGS[u.label];
    if (!s) return null;
    if (s.keep) return { label: u.label, keep: true, keepNote: s.keepNote, note: s.note };
    return { label: u.label, sugIcon: s.icon, note: s.note };
  }).filter(Boolean);

  if (!rows.length) return '';

  const keepRows = rows.filter(r => r.keep);
  const changeRows = rows.filter(r => !r.keep);

  return `<div class="ii-sug">
    <div class="ii-sug-title">💡 Suggested fix</div>
    <div class="ii-sug-rows">
      ${keepRows.map(r => `<div class="ii-sug-row">
        <span class="ii-sug-action">${r.label}</span>
        <span class="ii-sug-keep">${r.keepNote}</span>
      </div>`).join('')}
      ${changeRows.map(r => `<div class="ii-sug-row">
        <span class="ii-sug-action">${r.label}</span>
        <span class="ii-sug-arrow">→</span>
        <span class="ii-sug-new"><img src="${PNG(r.sugIcon)}" onerror="this.style.display='none'" loading="lazy"><span>${r.sugIcon}</span></span>
      </div>
      ${r.note ? `<div class="ii-sug-note" style="margin-left:0;padding-left:0;color:var(--text3)">${r.note}</div>` : ''}`).join('')}
    </div>
  </div>`;
}

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderTable(rows) {
  if (!rows.length) return '<div class="empty">No results.</div>';
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>Action / Label</th><th>Sections</th>
      <th class="plat">MOB</th><th class="plat">EXT</th><th class="plat">WEB</th>
      <th>Status</th>
    </tr></thead>
    <tbody>${rows.map(r=>`<tr class="${r.status==='conflict'?'conflict':(r.dup?'dup':'')}">
      <td class="lbl">${r.l}</td>
      <td class="seccell">${secTags(r.s)}</td>
      <td>${icell(r.mob,r.status,r.dup)}</td>
      <td>${icell(r.ext,r.status,r.dup)}</td>
      <td>${icell(r.web,r.status,r.dup)}</td>
      <td>${badge(r)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ── GALLERY ───────────────────────────────────────────────────────────────────
function renderGallery(rows) {
  if (!rows.length) return '<div class="empty">No results.</div>';
  return `<div class="gallery">${rows.map(r=>{
    const ic = iconFor(r);
    return `<div class="card ${r.status==='conflict'?'conflict':(r.dup?'dup':'')}">
      <div class="card-img">${ic?`<img src="${PNG(ic)}" onerror="this.style.display='none'" loading="lazy">`:'<span style="color:var(--text3);font-size:10px">no icon</span>'}</div>
      <div class="card-body">
        <div class="card-lbl">${r.l}</div>
        <div class="card-sec">${r.s.join(', ')}</div>
        <div class="card-status">${badge(r)}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── DUPLICATES TAB ────────────────────────────────────────────────────────────
function renderDuplicates() {
  const q = document.getElementById('search').value.toLowerCase();
  const dups = Object.entries(iconMap).filter(([k,v])=>v.length>1&&(!q||k.includes(q)));
  if (!dups.length) return '<div class="empty">No duplicates.</div>';
  return `<div class="dup-panel">${dups.map(([icon,uses])=>`
    <div class="dup-card">
      <div class="ii-header">
        <div class="ii-img"><img src="${PNG(icon)}" onerror="this.style.display='none'" loading="lazy"></div>
        <div><div class="ii-name">${icon}</div><div class="ii-count">Used for ${uses.length} different actions</div></div>
        <span class="ii-badge-dup" style="margin-left:auto">⚠️ Duplicate</span>
      </div>
      <div class="ii-actions-wrap">${uses.map(u=>`<div class="ii-action-row">
        <div class="ii-action-lbl">${u.label}</div>
        <div class="ii-action-sec">${u.sections.join(', ')}</div>
      </div>`).join('')}</div>
      ${sugBox(uses)}
    </div>`).join('')}</div>`;
}

// ── ICON INDEX ────────────────────────────────────────────────────────────────
function renderIconIndex() {
  const all = Object.entries(iconMap).sort((a,b)=>{
    const aP=a[1].length>1, bP=b[1].length>1;
    if (aP!==bP) return bP-aP;
    return a[0].localeCompare(b[0]);
  });
  const prob = all.filter(([,v])=>v.length>1);

  return `
    <div class="ii-topstats">
      <div class="ii-topstat"><div class="n" style="color:var(--blue)">${all.length}</div><div class="l">Unique icons in use</div></div>
      <div class="ii-topstat"><div class="n" style="color:var(--green)">${all.length-prob.length}</div><div class="l">Used for 1 action ✓</div></div>
      <div class="ii-topstat"><div class="n" style="color:var(--orange)">${prob.length}</div><div class="l">Used for 2+ actions ⚠️</div></div>
    </div>
    <div class="ii-grid">
    ${all.map(([icon,uses])=>{
      const isP = uses.length>1;
      return `<div class="ii-card ${isP?'problem':'clean'}">
        <div class="ii-header">
          <div class="ii-img"><img src="${PNG(icon)}" onerror="this.style.display='none'" loading="lazy"></div>
          <div style="flex:1;min-width:0">
            <div class="ii-name" style="font-size:12px">${icon}</div>
            <div class="ii-count">${uses.length} action${uses.length>1?'s':''}</div>
          </div>
          ${isP?`<span class="ii-badge-dup">⚠️</span>`:`<span class="ii-badge-ok">✓</span>`}
        </div>
        <div class="ii-actions-wrap">
          ${uses.map(u=>`<div class="ii-action-row">
            <div class="ii-action-lbl">${u.label}</div>
            <div class="ii-action-sec">${u.sections.join(', ')}</div>
          </div>`).join('')}
        </div>
        ${isP ? sugBox(uses) : ''}
      </div>`;
    }).join('')}
    </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const rows = filtered();
  document.getElementById('n-all').textContent   = enriched.length;
  document.getElementById('n-ok').textContent    = enriched.filter(r=>r.status==='ok').length;
  document.getElementById('n-conf').textContent  = enriched.filter(r=>r.status==='conflict').length;
  document.getElementById('n-dup').textContent   = enriched.filter(r=>r.dup).length;
  document.getElementById('n-icons').textContent = Object.keys(iconMap).length;

  document.getElementById('countInfo').textContent =
    ['table','gallery','duplicates'].includes(tab) ? `Showing ${rows.length} of ${enriched.length} actions` : '';

  const v = document.getElementById('view');
  if      (tab==='table')      v.innerHTML = renderTable(rows);
  else if (tab==='gallery')    v.innerHTML = renderGallery(rows);
  else if (tab==='duplicates') v.innerHTML = renderDuplicates();
  else if (tab==='iconindex')  v.innerHTML = renderIconIndex();
}

render();
</script>
</body>
</html>
