<html lang="en">
<head>
<meta charset="UTF-8">

<title>Icon System Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #FFEF46; --yellow-dim: rgba(255,239,70,0.1); --yellow-border: rgba(255,239,70,0.25);
  --bg: #02050A; --bg1: #0d1117; --bg2: #141a22; --bg3: #1c2535;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
  --text: #e8eaf0; --text2: #8a94a6; --text3: #4a5568;
  --red: #ef5350; --red-bg: rgba(239,83,80,0.1); --red-border: rgba(239,83,80,0.3);
  --orange: #FF9340; --orange-bg: rgba(255,147,64,0.1); --orange-border: rgba(255,147,64,0.3);
  --green: #4caf50; --green-bg: rgba(76,175,80,0.1);
  --blue: #7F9FF6; --blue-bg: rgba(127,159,246,0.1);
  --sans: 'FK Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'FK Grotesk Mono', 'SF Mono', 'Fira Code', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; min-height: 100vh; }

/* ── HEADER ── */
header { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.hlogo { width: 44px; height: 44px; flex-shrink: 0; }
.htxt h1 { font-size: 17px; font-weight: 700; color: var(--yellow); letter-spacing: -.3px; }
.htxt p  { font-size: 11px; color: var(--text3); margin-top: 2px; }
.plat-tags { display: flex; gap: 5px; }
.plat-tag { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 7px; letter-spacing: .06em; }
.stats { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 13px; text-align: center; cursor: pointer; transition: border-color .15s; min-width: 72px; }
.stat:hover { border-color: var(--border2); }
.stat.active { border-color: var(--yellow); background: var(--yellow-dim); }
.stat .n { font-size: 18px; font-weight: 700; line-height: 1.2; }
.stat .l { font-size: 10px; color: var(--text3); margin-top: 1px; }
.stat.cy .n { color: var(--yellow); } .stat.cg .n { color: var(--green); }
.stat.cr .n { color: var(--red); }   .stat.co .n { color: var(--orange); }
.stat.cb .n { color: var(--blue); }

/* ── CONTROLS ── */
.controls { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 10; }
input[type=search] { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-family: var(--sans); padding: 7px 12px; width: 220px; outline: none; }
input[type=search]:focus { border-color: var(--yellow); }
select { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; font-family: var(--sans); padding: 7px 10px; outline: none; cursor: pointer; }
.fbtn { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; font-size: 11px; font-family: var(--sans); padding: 4px 12px; transition: all .15s; white-space: nowrap; }
.fbtn:hover { border-color: var(--border2); color: var(--text); }
.fbtn.active { background: var(--yellow); border-color: var(--yellow); color: #000; font-weight: 600; }

/* ── TABS ── */
.tabs { display: flex; background: var(--bg1); border-bottom: 1px solid var(--border); padding: 0 24px; overflow-x: auto; }
.tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); cursor: pointer; font-size: 12px; font-family: var(--sans); padding: 11px 16px; transition: all .15s; white-space: nowrap; }
.tab:hover { color: var(--text2); }
.tab.active { border-bottom-color: var(--yellow); color: var(--yellow); font-weight: 600; }

main { padding: 20px 24px; }
.count-info { color: var(--text3); font-size: 11px; margin-bottom: 14px; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--bg2); }
th { color: var(--text3); font-weight: 500; padding: 10px 14px; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: .04em; text-transform: uppercase; font-family: var(--sans); }
th.plat { color: var(--yellow); font-family: var(--mono); letter-spacing: .1em; }
tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .1s; }
tbody tr:hover { background: var(--bg2); }
tbody tr:last-child { border-bottom: none; }
tbody tr.conflict { background: var(--red-bg); }
tbody tr.conflict:hover { background: rgba(239,83,80,0.15); }
tbody tr.dup { background: var(--orange-bg); }
tbody tr.dup:hover { background: rgba(255,147,64,0.14); }
td { padding: 9px 14px; vertical-align: middle; }
td.lbl { font-weight: 500; color: var(--text); white-space: nowrap; }
td.seccell { font-size: 11px; }
td.statuscel { white-space: nowrap; }

.sec-tag { font-family: var(--mono); background: var(--bg3); border-radius: 3px; color: var(--text3); display: inline-block; font-size: 10px; margin: 1px 2px 1px 0; padding: 1px 5px; white-space: nowrap; }

/* icon pill: glyph + name */
.ipill { display: inline-flex; align-items: center; gap: 7px; }
.ig { /* Material Symbols via font */
  font-family: 'Material Symbols Outlined'; font-size: 18px; line-height: 1;
  color: rgba(255,255,255,0.55); flex-shrink: 0; display: inline-block; width: 20px; text-align: center;
  font-weight: normal; font-style: normal; letter-spacing: normal; text-transform: none;
  white-space: nowrap; -webkit-font-feature-settings:'liga'; font-feature-settings:'liga';
  -webkit-font-smoothing: antialiased;
}
.itag { font-family: var(--mono); font-size: 11px; color: var(--text2); background: var(--bg3); padding: 2px 6px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; display: inline-block; cursor: pointer; transition: background .12s, color .12s; }
.itag:hover { background: var(--yellow-dim); color: var(--yellow); border-color: var(--yellow-border); }
.itag.ci { background: var(--red-bg); color: #f87171; }
.itag.ci:hover { background: rgba(239,83,80,0.2); }
.itag.di { background: var(--orange-bg); color: var(--orange); }
.itag.di:hover { background: rgba(255,147,64,0.2); }
.dash { color: var(--text3); }

.badge { border-radius: 4px; display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; white-space: nowrap; }
.badge.ok       { background: var(--green-bg); color: var(--green); }
.badge.conflict { background: var(--red-bg); color: var(--red); }
.badge.dup      { background: var(--orange-bg); color: var(--orange); }
.badge.none     { color: var(--text3); }
.badge-primary { background: rgba(255,239,70,0.15); border: 1px solid rgba(255,239,70,0.35); border-radius: 4px; color: var(--yellow); display: inline-block; font-size: 10px; font-weight: 600; margin-left: 4px; padding: 2px 5px; white-space: nowrap; vertical-align: middle; line-height: 1; }

/* ── GALLERY ── */
.gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; }
.gcard { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: all .15s; }
.gcard:hover { border-color: var(--border2); transform: translateY(-1px); }
.gcard.conflict { border-color: var(--red-border); }
.gcard.dup      { border-color: var(--orange-border); }
.gcard-preview {
  height: 80px; background: var(--bg2);
  display: flex; align-items: center; justify-content: center;
}
/* Large glyph in gallery */
.gcard-preview .ig { font-size: 42px; width: auto; color: rgba(255,255,255,0.75); }
.gcard-preview .ig.ci { color: rgba(239,83,80,0.8); }
.gcard-preview .ig.di { color: rgba(255,147,64,0.8); }
.gcard-body { padding: 8px 9px; }
.gcard-icon { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gcard-lbl  { color: var(--text); font-size: 10px; font-weight: 500; line-height: 1.3; margin-bottom: 2px; }
.gcard-sec  { color: var(--text3); font-size: 9px; }
.gcard-status { font-size: 10px; margin-top: 4px; }

/* ── ICON INDEX ── */
.ii-topstats { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
.ii-topstat { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; text-align: center; }
.ii-topstat .n { font-size: 22px; font-weight: 700; }
.ii-topstat .l { font-size: 10px; color: var(--text3); margin-top: 2px; }
.ii-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 12px; }
.ii-card { background: var(--bg1); border-radius: 10px; overflow: hidden; }
.ii-card.clean   { border: 1px solid var(--border); }
.ii-card.problem { border: 1px solid var(--orange-border); }
.ii-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
/* Big icon in index card header */
.ii-thumb {
  background: var(--bg2); border-radius: 8px;
  width: 52px; height: 52px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.ii-thumb .ig { font-size: 32px; width: auto; color: rgba(255,255,255,0.75); }
.ii-name  { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--yellow); word-break: break-all; }
.ii-count { color: var(--text3); font-size: 11px; margin-top: 2px; }
.ii-badge-ok  { background: var(--green-bg); border-radius: 4px; color: var(--green); font-size: 10px; font-weight: 700; padding: 2px 7px; margin-left: auto; flex-shrink: 0; }
.ii-badge-dup { background: var(--orange-bg); border-radius: 4px; color: var(--orange); font-size: 10px; font-weight: 700; padding: 2px 7px; margin-left: auto; flex-shrink: 0; }
.ii-rows { border-top: 1px solid var(--border); }
.ii-row { border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: flex-start; gap: 10px; padding: 7px 14px; }
.ii-row:last-child { border-bottom: none; }
.ii-row-lbl { color: var(--text); font-size: 11px; font-weight: 500; flex: 1; min-width: 0; }
.ii-row-sec { color: var(--text3); font-size: 10px; flex-shrink: 0; text-align: right; max-width: 110px; }

/* ── SUGGESTION BOX ── */
.sug { background: rgba(127,159,246,0.07); border: 1px solid rgba(127,159,246,0.2); border-radius: 7px; margin: 0 14px 12px; padding: 10px 12px; }
.sug-title { color: var(--blue); font-size: 10px; font-weight: 700; letter-spacing: .06em; margin-bottom: 8px; text-transform: uppercase; }
.sug-rows { display: flex; flex-direction: column; gap: 6px; }
.sug-row { display: flex; align-items: center; gap: 8px; font-size: 11px; flex-wrap: wrap; }
.sug-action { color: var(--text2); flex: 1; min-width: 100px; }
.sug-keep { color: var(--text3); font-family: var(--mono); font-size: 10px; }
.sug-arrow { color: var(--text3); }
.sug-new { align-items: center; background: var(--bg3); border: 1px solid rgba(165,214,167,0.2); border-radius: 5px; display: inline-flex; gap: 6px; padding: 3px 8px; }
.sug-new .ig { font-size: 14px; width: auto; color: #a5d6a7; }
.sug-new-name { color: #a5d6a7; font-family: var(--mono); font-size: 10px; }
.sug-note { color: var(--text3); font-size: 10px; font-style: italic; margin-top: 2px; padding-left: 0; }

/* ── DUP TAB ── */
.dup-panel { display: flex; flex-direction: column; gap: 10px; }
.dup-card { background: var(--bg1); border: 1px solid var(--orange-border); border-radius: 10px; overflow: hidden; }

.empty { color: var(--text3); padding: 60px; text-align: center; }
</style>
</head>

  {l:'Search',                    mob:'search',            ext:null,                web:null,                s:['Prediction Markets']},
  {l:'Trending',                  mob:'trending_up',       ext:null,                web:null,                s:['Prediction Markets']},
  {l:'New',                       mob:'auto_awesome',      ext:null,                web:null,                s:['Prediction Markets']},
  {l:'Volume',                    mob:'bar_chart',         ext:null,                web:null,                s:['Prediction Markets']},
  {l:'Liquidity',                 mob:'swap_horiz',        ext:null,                web:null,                s:['Prediction Markets']},
  {l:'Starting soon',             mob:'calendar_today',    ext:null,                web:null,                s:['Prediction Markets']},
  {l:'Closing soon',              mob:'calendar_month',    ext:null,                web:null,                s:['Prediction Markets']},
  // Market page filters
  {l:'Gainers',                   mob:'trending_up',       ext:'trending_up',       web:'trending_up',       s:['Market']},
  {l:'Losers',                    mob:'trending_down',     ext:'trending_down',     web:'trending_down',     s:['Market']},
  {l:'Market cap',                mob:'paid',              ext:'paid',              web:'paid',              s:['Market']},
  {l:'Volume (market)',           mob:'sync',              ext:'sync',              web:'sync',              s:['Market']},
  {l:'Liquidity (market)',        mob:'swap_horiz',        ext:'swap_horiz',        web:'swap_horiz',        s:['Market']},
  {l:'Holders',                   mob:'group',             ext:'group',             web:'group',             s:['Market']},
  {l:'Last added',                mob:'history',           ext:'history',           web:'history',           s:['Market']},
  // Delta change (price / holders 24h etc)
  {l:'Delta change up',           mob:'north_east',        ext:'north_east',        web:'north_east',        s:['Market','STP','Portfolio']},
  {l:'Delta change down',         mob:'south_east',        ext:'south_east',        web:'south_east',        s:['Market','STP','Portfolio']},
];

const SUGS = {
  'Gainers':                     { icon:'trending_up',  keep:true, keepNote:'trending_up stays for Gainers' },
  'Losers':                      { icon:'trending_down', keep:true, keepNote:'trending_down is distinct — unique to Losers' },
  'Market cap':                  { icon:'paid', keep:true, keepNote:'paid stays for Market cap' },
  'Volume (market)':             { icon:'sync', keep:true, keepNote:'sync stays for Volume (market)' },
  'Liquidity (market)':          { icon:'swap_horiz', note:'swap_horiz also used for Swap/Trade nav — consider water_drop', icon:'water_drop' },
  'Holders':                     { icon:'group', keep:true, keepNote:'group stays for Holders — unique usage' },
  'Last added':                  { icon:'history', note:'history also used for Activity nav — consider schedule or more_time', icon:'schedule' },
  'Delta change up':             { icon:'north_east', keep:true, keepNote:'north_east stays for delta up' },
  'Delta change down':           { icon:'south_east', keep:true, keepNote:'south_east stays for delta down' },
  'Stocks placeholder':          { icon:'candlestick_chart', note:'More specific to financial data visualization' },
  'Volume':                      { icon:'equalizer',         note:'Suggests quantity/magnitude, not market chart' },
  'Liquidity':                   { icon:'water_drop',        note:'Liquid assets metaphor, distinct from swap' },
  'Homepage':                    { icon:'captive_portal',    note:'Avoid "home" — used in browser nav. captive_portal suggests a web entry point' },
  'Save':                        { icon:'download',          note:'Semantically clearer for saving/downloading an NFT' },
  'Currency':                    { icon:'currency_exchange', note:'More specific to currency settings vs. card payments' },
  'Privacy policy':              { icon:'policy',            note:'Document-like, distinct from security settings' },
  'Earn Instructions':           { icon:'info',              note:'Instructions are informational, not a payment action' },
  'Grid view':                   { icon:'grid_on',           note:'Collections nav uses grid_view — grid_on is distinct for the toggle' },
  'Customize / Edit background': { icon:'brush', keep:true,  keepNote:'brush stays for Customize; use palette for Edit background' },
  'Add to watchlist':            { icon:'star', keep:true,   keepNote:'Filled star ★' },
  'Remove from watchlist':       { icon:'star', keep:true,   keepNote:'Outlined star ☆ (star_border variant)', note:'Same icon name, different fill variant' },
  'Limit order':                 { icon:'price_change',      note:'Suggests price threshold/target more clearly' },
  'Request password':            { icon:'password',          note:'More specific than key for password entry' },
  'Change passcode / Lock':      { icon:'lock', keep:true,   keepNote:'lock stays as primary auth action' },
  'Explore':                     { icon:'language', keep:true, keepNote:'language stays for Explore nav' },
  'Market':                      { icon:'bar_chart', keep:true, keepNote:'bar_chart stays for Market nav' },
};

// ── BUILD ICON MAP ────────────────────────────────────────────────────────────
const iconMap = {};
DATA.forEach(r => {
  [...new Set([r.mob,r.ext,r.web].filter(Boolean))].forEach(ic => {
    if (!iconMap[ic]) iconMap[ic] = [];
    if (!iconMap[ic].find(x => x.label===r.l))
      iconMap[ic].push({label:r.l, sections:r.s});
  });
});

// ── STATUS ────────────────────────────────────────────────────────────────────
// Conflict  = different icons across platforms for the same action
// Duplicate = same icon used for multiple different actions (regardless of platform)
// OK        = icon is unique to this action AND consistent across all platforms where it appears
// none      = only on one platform, nothing to compare
function getStatus(r) {
  // Check conflict first: different icon values across platforms (where defined)
  const pairs = [['mob','ext'],['mob','web'],['ext','web']];
  for (const [a,b] of pairs)
    if (r[a] && r[b] && r[a] !== r[b]) return 'conflict';
  // Check duplicate: is any of this row's icons shared with another action?
  const icons = [...new Set([r.mob,r.ext,r.web].filter(Boolean))];
  if (icons.some(ic => iconMap[ic] && iconMap[ic].length > 1)) return 'dup';
  // Only one platform? — not comparable
  const present = [r.mob,r.ext,r.web].filter(Boolean);
  if (present.length <= 1) return 'none';
  // Consistent + unique = OK
  return 'ok';
}
// Separate from status — dup flag purely for icon-sharing detection
function isDup(r) {
  return ['mob','ext','web'].some(p => r[p] && iconMap[r[p]] && iconMap[r[p]].length > 1);
}

// Which action is "primary" for a given icon?
// Primary = the one listed first in SUGS as keep:true, or first action alphabetically
const primaryForIcon = {};
Object.entries(SUGS).forEach(([label, s]) => {
  if (s.keep) {
    // find which icon this label uses
    const row = DATA.find(r => r.l === label);
    if (row) {
      const ic = row.mob || row.ext || row.web;
      if (ic && !primaryForIcon[ic]) primaryForIcon[ic] = label;
    }
  }
});
// For icons without explicit SUGS keep, assign first action as primary
Object.entries(iconMap).forEach(([ic, uses]) => {
  if (uses.length > 1 && !primaryForIcon[ic])
    primaryForIcon[ic] = uses[0].label;
});
function iconFor(r) { return r.mob||r.ext||r.web; }
const enriched = DATA.map(r => {
  const status = getStatus(r);
  const dup = isDup(r);
  const ic = r.mob || r.ext || r.web;
  const isPrimary = dup && ic && primaryForIcon[ic] === r.l;
  return {...r, status, dup, isPrimary};
});
const allSecs = [...new Set(DATA.flatMap(d=>d.s))].sort();

// ── ICON GLYPH HELPER ─────────────────────────────────────────────────────────
// Material Symbols renders the icon name as a ligature
function ig(name, extraCls='') {
  return `<span class="ig${extraCls?' '+extraCls:''}">${name}</span>`;
}

// clickable pill — clicking icon name fills search
function ipill(name, st, dp) {
  if (!name) return '<span class="dash">—</span>';
  const tc = st==='conflict'?'ci':(dp?'di':'');
  return `<div class="ipill">${ig(name)}<span class="itag ${tc}" title="${name}" onclick="searchIcon('${name}')">${name}</span></div>`;
}

function badge(r) {
  if (r.status==='conflict') return '<span class="badge conflict">⚡ Conflict</span>';
  if (r.status==='ok')       return '<span class="badge ok">✅ OK</span>';
  if (r.dup) {
    const star = r.isPrimary ? '<span class="badge-primary" title="Primary usage — keep this icon here">⭐</span>' : '';
    return `<span class="badge dup">⚠️ Duplicate</span>${star}`;
  }
  return '<span class="badge none">—</span>';
}
function secTags(arr) { return arr.map(s=>`<span class="sec-tag">${s}</span>`).join(''); }

function sugBox(uses) {
  const rows = uses.map(u=>{
    const s=SUGS[u.label]; if(!s) return null;
    return s.keep ? {label:u.label,keep:true,keepNote:s.keepNote,note:s.note}
                  : {label:u.label,sugIcon:s.icon,note:s.note};
  }).filter(Boolean);
  if (!rows.length) return '';
  const keeps=rows.filter(r=>r.keep), changes=rows.filter(r=>!r.keep);
  return `<div class="sug">
    <div class="sug-title">💡 Suggested fix</div>
    <div class="sug-rows">
      ${keeps.map(r=>`<div class="sug-row"><span class="sug-action">${r.label}</span><span class="sug-keep">${r.keepNote}</span></div>${r.note?`<div class="sug-note">${r.note}</div>`:''}`).join('')}
      ${changes.map(r=>`<div class="sug-row"><span class="sug-action">${r.label}</span><span class="sug-arrow">→</span><span class="sug-new">${ig(r.sugIcon)}<span class="sug-new-name">${r.sugIcon}</span></span></div>${r.note?`<div class="sug-note">${r.note}</div>`:''}`).join('')}
    </div>
  </div>`;
}

// ── UI INIT ───────────────────────────────────────────────────────────────────
const secSel = document.getElementById('secFilter');
allSecs.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;secSel.appendChild(o);});

let filter='all', tab='table';

const statDefs = [
  {id:'all',  l:'Total',        cls:'cy', f:'all'},
  {id:'ok',   l:'Consistent',  cls:'cg', f:'ok'},
  {id:'conf', l:'Conflicts',   cls:'cr', f:'conflicts'},
  {id:'dup',  l:'Duplicates',  cls:'co', f:'dup'},
  {id:'icons',l:'Unique icons',cls:'cb', f:null, t:'iconindex'},
];
const sBar = document.getElementById('statsBar');
statDefs.forEach(s=>{
  const el=document.createElement('div');
  el.className=`stat ${s.cls}`;el.id=`stat-${s.id}`;
  el.innerHTML=`<div class="n" id="n-${s.id}">—</div><div class="l">${s.l}</div>`;
  el.onclick=()=>s.t?setTab(s.t):setFilter(s.f);
  sBar.appendChild(el);
});

const fDefs=[{l:'All',f:'all'},{l:'⚡ Conflicts',f:'conflicts'},{l:'✅ Consistent',f:'ok'},{l:'⚠️ Duplicates',f:'dup'}];
const fBtns=document.getElementById('filterBtns');
fDefs.forEach((fd,i)=>{
  const b=document.createElement('button');
  b.className='fbtn'+(i===0?' active':'');b.textContent=fd.l;
  b.onclick=()=>setFilter(fd.f);fBtns.appendChild(b);
});

const tabDefs=[{id:'table',l:'📋 Table'},{id:'gallery',l:'🖼 Gallery'},{id:'iconindex',l:'🔢 Icon Index'},{id:'duplicates',l:'⚠️ Same icon, diff action'}];
const tBar=document.getElementById('tabBar');
tabDefs.forEach(td=>{
  const b=document.createElement('button');
  b.className='tab'+(td.id==='table'?' active':'');b.textContent=td.l;
  b.onclick=()=>setTab(td.id);tBar.appendChild(b);
});

function setFilter(f) {
  filter=f;
  fDefs.forEach((fd,i)=>fBtns.children[i].classList.toggle('active',fd.f===f));
  statDefs.forEach(s=>document.getElementById(`stat-${s.id}`)?.classList.remove('active'));
  ({all:'stat-all',ok:'stat-ok',conflicts:'stat-conf',dup:'stat-dup'})[f] &&
    document.getElementById(({all:'stat-all',ok:'stat-ok',conflicts:'stat-conf',dup:'stat-dup'})[f])?.classList.add('active');
  render();
}
function setTab(t) {
  tab=t;
  tabDefs.forEach((td,i)=>tBar.children[i].classList.toggle('active',td.id===t));
  document.getElementById('controls').style.display=t==='iconindex'?'none':'flex';
  document.getElementById('stat-icons').classList.toggle('active',t==='iconindex');
  render();
}

// ── SORT & GROUP by icon ─────────────────────────────────────────────────────
function sortAndGroup(rows) {
  // For each row, pick the "primary" icon (first non-null across mob/ext/web)
  // and group rows by that icon, then sort groups by usage count descending.

  // Build: icon → [rows]
  const groups = {};
  const rowIcon = r => r.mob || r.ext || r.web || '__none__';

  rows.forEach(r => {
    const ic = rowIcon(r);
    if (!groups[ic]) groups[ic] = [];
    groups[ic].push(r);
  });

  // Score each group: how many distinct actions share any icon in this group
  function groupScore(ic) {
    const usage = iconMap[ic]?.length || 0;       // how many actions share this icon
    const hasDup = groups[ic].some(r => r.dup);
    const hasConflict = groups[ic].some(r => r.status === 'conflict');
    return usage * 1000 + (hasDup ? 10 : 0) + (hasConflict ? 5 : 0);
  }

  // Sort group keys by score desc, then alphabetically within same score
  const sortedKeys = Object.keys(groups).sort((a, b) => {
    const diff = groupScore(b) - groupScore(a);
    return diff !== 0 ? diff : a.localeCompare(b);
  });

  // Flatten: all rows of group A, then all rows of group B, etc.
  return sortedKeys.flatMap(ic => groups[ic]);
}

function filtered() {
  const q = document.getElementById('search').value.toLowerCase();
  const sec = document.getElementById('secFilter').value;
  const base = enriched.filter(r => {
    if (sec && !r.s.includes(sec)) return false;
    if (q && !r.l.toLowerCase().includes(q) && !['mob','ext','web'].some(p => r[p]?.includes(q))) return false;
    if (filter === 'ok') return r.status === 'ok';
    if (filter === 'conflicts') return r.status === 'conflict';
    if (filter === 'dup') return r.dup;
    return true;
  });
  // Group by icon only in default view (no text search active)
  return (filter === 'all' && !q) ? sortAndGroup(base) : base;
}

// ── RENDERS ───────────────────────────────────────────────────────────────────
function renderTable(rows) {
  if (!rows.length) return '<div class="empty">No results.</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Action / Label</th><th>Sections</th><th class="plat">MOB</th><th class="plat">EXT</th><th class="plat">WEB</th><th>Status</th></tr></thead>
    <tbody>${rows.map(r=>`<tr class="${r.status==='conflict'?'conflict':(r.dup?'dup':'')}">
      <td class="lbl">${r.l}</td>
      <td class="seccell">${secTags(r.s)}</td>
      <td>${ipill(r.mob,r.status,r.dup)}</td>
      <td>${ipill(r.ext,r.status,r.dup)}</td>
      <td>${ipill(r.web,r.status,r.dup)}</td>
      <td class="statuscel">${badge(r)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderGallery(rows) {
  if (!rows.length) return '<div class="empty">No results.</div>';
  return `<div class="gallery">${rows.map(r=>{
    const ic=iconFor(r);
    const gc=r.status==='conflict'?'ci':(r.dup?'di':'');
    return `<div class="gcard ${r.status==='conflict'?'conflict':(r.dup?'dup':'')}">
      <div class="gcard-preview">${ic?ig(ic,gc):'<span style="color:var(--text3);font-size:11px">—</span>'}</div>
      <div class="gcard-body">
        <div class="gcard-icon">${ic||''}</div>
        <div class="gcard-lbl">${r.l}</div>
        <div class="gcard-sec">${r.s.join(', ')}</div>
        <div class="gcard-status">${badge(r)}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderDuplicates() {
  const q=document.getElementById('search').value.toLowerCase();
  const dups=Object.entries(iconMap).filter(([k,v])=>v.length>1&&(!q||k.includes(q)));
  if (!dups.length) return '<div class="empty">No duplicates.</div>';
  return `<div class="dup-panel">${dups.map(([icon,uses])=>`
    <div class="dup-card">
      <div class="ii-header">
        <div class="ii-thumb">${ig(icon)}</div>
        <div><div class="ii-name">${icon}</div><div class="ii-count">Used for ${uses.length} different actions</div></div>
        <span class="ii-badge-dup" style="margin-left:auto">⚠️ Duplicate</span>
      </div>
      <div class="ii-rows">${uses.map(u=>`<div class="ii-row"><div class="ii-row-lbl">${u.label}</div><div class="ii-row-sec">${u.sections.join(', ')}</div></div>`).join('')}</div>
      ${sugBox(uses)}
    </div>`).join('')}</div>`;
}

function renderIconIndex() {
  const all=Object.entries(iconMap).sort((a,b)=>{
    const aP=a[1].length>1,bP=b[1].length>1;
    return aP!==bP?bP-aP:a[0].localeCompare(b[0]);
  });
  const prob=all.filter(([,v])=>v.length>1);
  return `<div class="ii-topstats">
    <div class="ii-topstat"><div class="n" style="color:var(--blue)">${all.length}</div><div class="l">Unique icons in use</div></div>
    <div class="ii-topstat"><div class="n" style="color:var(--green)">${all.length-prob.length}</div><div class="l">Used for 1 action ✓</div></div>
    <div class="ii-topstat"><div class="n" style="color:var(--orange)">${prob.length}</div><div class="l">Used for 2+ actions ⚠️</div></div>
  </div>
  <div class="ii-grid">${all.map(([icon,uses])=>{
    const isP=uses.length>1;
    return `<div class="ii-card ${isP?'problem':'clean'}">
      <div class="ii-header">
        <div class="ii-thumb">${ig(icon)}</div>
        <div style="flex:1;min-width:0">
          <div class="ii-name">${icon}</div>
          <div class="ii-count">${uses.length} action${uses.length>1?'s':''}</div>
        </div>
        ${isP?`<span class="ii-badge-dup">⚠️</span>`:`<span class="ii-badge-ok">✓</span>`}
      </div>
      <div class="ii-rows">${uses.map(u=>`<div class="ii-row"><div class="ii-row-lbl">${u.label}</div><div class="ii-row-sec">${u.sections.join(', ')}</div></div>`).join('')}</div>
      ${isP?sugBox(uses):''}
    </div>`;
  }).join('')}</div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
// search by icon name (called on tag click)
function searchIcon(name) {
  const el = document.getElementById('search');
  el.value = name;
  // switch to table tab and clear section filter
  if (tab !== 'table') setTab('table');
  if (filter !== 'all') setFilter('all');
  render();
  el.focus();
}

function render() {
  const rows=filtered();
  document.getElementById('n-all').textContent   = enriched.length;
  document.getElementById('n-ok').textContent    = enriched.filter(r=>r.status==='ok').length;
  document.getElementById('n-conf').textContent  = enriched.filter(r=>r.status==='conflict').length;
  document.getElementById('n-dup').textContent   = enriched.filter(r=>r.dup).length;
  document.getElementById('n-icons').textContent = Object.keys(iconMap).length;
  document.getElementById('countInfo').textContent =
    ['table','gallery','duplicates'].includes(tab)?`Showing ${rows.length} of ${enriched.length} actions`:'';
  const v=document.getElementById('view');
  if      (tab==='table')      v.innerHTML=renderTable(rows);
  else if (tab==='gallery')    v.innerHTML=renderGallery(rows);
  else if (tab==='duplicates') v.innerHTML=renderDuplicates();
  else if (tab==='iconindex')  v.innerHTML=renderIconIndex();
}
render();
</script>
